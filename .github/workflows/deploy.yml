name: Deploy to GitHub Pages

on:
  # Trigger on every push to main
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Allow this workflow to clone the repo and create a Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress runs on new pushes
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright's Chromium (for LikeC4 diagram export)
        run: npx playwright install --with-deps chromium

      - name: Build site (exports LikeC4 diagrams, then builds Astro)
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
